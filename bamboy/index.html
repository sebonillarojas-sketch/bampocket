document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;atomic purple&quot;,&quot;cobalt&quot;,&quot;smoke&quot;],&quot;default&quot;:&quot;atomic purple&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Carcasa&quot;},&quot;screenGlow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Pantalla&quot;},&quot;skipBoot&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Pantalla&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'boot', dialogueIdx: 0, menuIdx: 0, blobTalking: false };\n  DIALOGUE = ['HOLA. SOY ALICE.', 'BIENVENIDO AL BAMBOY POCKET DE BAM STUDIO.', 'AQUI VIVIRAN TODOS NUESTROS JUEGOS.', 'PULSA START PARA VER LOS SLOTS.'];\n  SLOTS = [\n    { label: 'HELICOPTER', url: 'heli.html' },\n    { label: 'ASTEROIDS', url: 'asteroids.html' },\n    { label: 'SPACE INVADERS', url: 'invaders.html' },\n    { label: 'LUNAR LANDER', url: 'lander.html' },\n    { label: 'DUCK HUNT', url: 'duckhunt.html' },\n    { label: 'SNAKE', url: 'snake.html' },\n    { label: 'PONG', url: 'pong.html' },\n    { label: 'TETRIS', url: 'tetris.html' },\n  ];\n  componentDidMount() {\n    this.startBoot();\n    this._unlock = () => { this.audio(); if (this.state.screen === 'boot' && !this._chimed) this.bootChime(); };\n    window.addEventListener('pointerdown', this._unlock);\n    window.addEventListener('keydown', this._unlock);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('pointerdown', this._unlock);\n    window.removeEventListener('keydown', this._unlock);\n  }\n  audio() {\n    if (!this._ctx) { try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; } }\n    if (this._ctx.state === 'suspended') this._ctx.resume();\n    return this._ctx;\n  }\n  tone(freq, t0, dur, vol, type) {\n    const ctx = this.audio(); if (!ctx || ctx.state !== 'running') return false;\n    const o = ctx.createOscillator(), g = ctx.createGain();\n    o.type = type || 'square'; o.frequency.value = freq;\n    g.gain.setValueAtTime(0.0001, ctx.currentTime + t0);\n    g.gain.exponentialRampToValueAtTime(vol, ctx.currentTime + t0 + 0.01);\n    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + dur);\n    o.connect(g); g.connect(ctx.destination);\n    o.start(ctx.currentTime + t0); o.stop(ctx.currentTime + t0 + dur + 0.05);\n    return true;\n  }\n  bootChime() {\n    // \"pi-ling!\" estilo Game Boy + arpegio de carga\n    const ok = this.tone(987.77, 0, 0.1, 0.12);\n    if (!ok) return;\n    this._chimed = true;\n    this.tone(1975.53, 0.12, 0.5, 0.12);\n    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => this.tone(f, 1.4 + i * 0.09, 0.08, 0.05));\n  }\n  blip() { this.tone(880, 0, 0.05, 0.06); }\n  startBoot() {\n    clearTimeout(this._t);\n    if (this.props.skipBoot) { this.setState({ screen: 'alice' }); return; }\n    this.setState({ screen: 'boot', dialogueIdx: 0 });\n    this._chimed = false;\n    setTimeout(() => this.bootChime(), 1200);\n    this._t = setTimeout(() => this.setState({ screen: 'alice' }), 10000);\n  }\n  advance = () => {\n    this.blip();\n    const s = this.state;\n    if (s.screen === 'boot') { clearTimeout(this._t); this.setState({ screen: 'alice' }); return; }\n    if (s.screen === 'alice') {\n      if (s.dialogueIdx >= this.DIALOGUE.length - 1) this.setState({ screen: 'menu' });\n      else {\n        this.setState({ dialogueIdx: s.dialogueIdx + 1, blobTalking: true });\n        clearTimeout(this._talk);\n        this._talk = setTimeout(() => this.setState({ blobTalking: false }), 1200);\n      }\n      return;\n    }\n    if (s.screen === 'menu') this.launch();\n  };\n  launch() {\n    const g = this.SLOTS[this.state.menuIdx];\n    [523.25, 659.25, 1046.5].forEach((f, i) => this.tone(f, i * 0.07, 0.07, 0.07));\n    this.setState({ screen: 'game', gameSrc: g.url });\n  }\n  back = () => {\n    if (this.state.screen === 'game') { this.setState({ screen: 'menu', gameSrc: '' }); return; }\n    if (this.state.screen === 'menu') this.setState({ screen: 'alice', dialogueIdx: this.DIALOGUE.length - 1 });\n  };\n  start = () => {\n    if (this.state.screen === 'boot') { clearTimeout(this._t); this.setState({ screen: 'alice' }); return; }\n    if (this.state.screen === 'game') return;\n    this.setState({ screen: 'menu' });\n  };\n  move = (d) => {\n    if (this.state.screen !== 'menu') return;\n    this.tone(659.25, 0, 0.04, 0.05);\n    const n = this.SLOTS.length;\n    this.setState(s => ({ menuIdx: (s.menuIdx + d + n) % n }));\n  };\n  gameBtn = (btn) => {\n    // manda el bot\u00f3n f\u00edsico al juego cargado en el iframe\n    const f = document.querySelector('iframe');\n    if (f && f.contentWindow) f.contentWindow.postMessage({ bamboy: 'btn', btn: btn }, '*');\n  };\n  inGame() { return this.state.screen === 'game'; }\n  pad = (dir) => this.inGame() ? this.gameBtn(dir) : this.move(dir === 'up' || dir === 'left' ? -1 : 1);\n  onKey = (e) => {\n    const k = e.key.toLowerCase();\n    if (this.inGame()) {\n      const map = { arrowup: 'up', arrowdown: 'down', arrowleft: 'left', arrowright: 'right', x: 'a', z: 'b', enter: 'start' };\n      if (map[k]) { e.preventDefault(); this.gameBtn(map[k]); }\n      return;\n    }\n    if (k === 'arrowup') { e.preventDefault(); this.move(-1); }\n    else if (k === 'arrowdown') { e.preventDefault(); this.move(1); }\n    else if (k === 'x' || k === 'a' || k === ' ') { e.preventDefault(); this.advance(); }\n    else if (k === 'z' || k === 'b') this.back();\n    else if (k === 'enter') this.start();\n  };\n  renderVals() {\n    const s = this.state;\n    const shells = {\n      'atomic purple': { tint: 'rgba(139,92,246,.22)', bg: 'linear-gradient(160deg, rgba(139,92,246,.34), rgba(76,29,149,.30))', glow: 'rgba(139,92,246,.18)' },\n      'cobalt': { tint: 'rgba(61,82,213,.22)', bg: 'linear-gradient(160deg, rgba(84,104,232,.34), rgba(42,59,175,.32))', glow: 'rgba(61,82,213,.18)' },\n      'smoke': { tint: 'rgba(30,34,48,.45)', bg: 'linear-gradient(160deg, rgba(60,66,88,.5), rgba(18,20,28,.6))', glow: 'rgba(107,114,128,.12)' },\n    };\n    const sh = shells[this.props.shellColor ?? 'atomic purple'] || shells['atomic purple'];\n    const glowOn = this.props.screenGlow ?? true;\n    return {\n      isBoot: s.screen === 'boot', isAlice: s.screen === 'alice', isMenu: s.screen === 'menu',\n      isGame: s.screen === 'game', gameSrc: s.gameSrc || '', back: this.back,\n      shellBg: sh.bg, shellTint: sh.tint, shellGlow: sh.glow,\n      screenGlowCss: glowOn ? 'rgba(139,92,246,.14)' : 'rgba(0,0,0,0)',\n      ledColor: s.screen === 'boot' ? '#fbbf24' : '#4ade80',\n      ledAnim: s.screen === 'boot' ? 'led-blink .5s ease-in-out infinite' : 'none',\n      blobAnim: s.blobTalking\n        ? 'blob-morph 1.8s ease-in-out infinite, blob-bounce .55s cubic-bezier(.36,1.4,.5,1) infinite'\n        : 'blob-morph 8s ease-in-out infinite, blob-float 5s ease-in-out infinite',\n      dialogueText: this.DIALOGUE[s.dialogueIdx],\n      dialogueHint: s.dialogueIdx >= this.DIALOGUE.length - 1 ? 'START \u25b8' : '\u25bc A',\n      menuItems: this.SLOTS.map((g, i) => ({\n        label: g.label, cursor: i === s.menuIdx ? '\u25b6' : '',\n        color: i === s.menuIdx ? '#F4F1EA' : '#6B7280',\n        bg: i === s.menuIdx ? 'rgba(61,82,213,.18)' : 'transparent',\n        border: i === s.menuIdx ? '#3D52D5' : '#222730',\n      })),\n      advance: this.advance,\n      pressA: () => this.inGame() ? this.gameBtn('a') : this.advance(),\n      pressB: () => this.inGame() ? this.gameBtn('b') : this.back(),\n      pressStart: () => this.inGame() ? this.gameBtn('start') : this.start(),\n      pressSelect: this.back,\n      padUp: () => this.pad('up'), padDown: () => this.pad('down'),\n      padLeft: () => this.pad('left'), padRight: () => this.pad('right'),\n      onKey: this.onKey,\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"
  </script>
