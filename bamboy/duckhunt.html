document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    return btoa(bin);
  }

  window.addEventListener('error', function(e) {

    // events at the element — warn only; real JS errors carry message/error.

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;

            const reader = ds.readable.getReader();

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {

            (entry.compressed ? toBase64(finalBytes) : entry.data);

          const blob = new Blob([finalBytes], { type: entry.mime });

        resourceBlobs[blobUrls[uuid]] = blob;
      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%;background:#000;overflow:hidden;font-family:'Press Start 2P',\"Courier New\",monospace;-webkit-user-select:none;user-select:none}\n  #wrap{position:fixed;inset:0}\n  canvas{display:block;touch-action:none;cursor:none;image-rendering:pixelated;image-rendering:crisp-edges}\n  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;\n    text-align:center;color:#fff;z-index:10}\n  .hidden{display:none!important}\n  a{color:#3fd7f7}a:hover{color:#fff}\n  /* black sign panel with blocky cyan letters, NES title-card style */\n  .sign{background:#080808;padding:26px 40px 30px;border:4px solid #080808;\n    box-shadow:0 0 0 4px #1a1a1a,10px 10px 0 rgba(0,0,0,.35)}\n  .sign .bam{display:block;font-size:clamp(11px,2.4vw,18px);color:#d82800;letter-spacing:6px;\n    text-shadow:2px 2px 0 #500a00;margin-bottom:14px}\n  .sign .big{display:block;font-size:clamp(30px,7.5vw,64px);color:#3fd7f7;letter-spacing:4px;line-height:1.15;\n    text-shadow:3px 3px 0 #0a5a70,6px 6px 0 #032830}\n  .sign .rule{height:4px;background:#c9a227;margin:10px 4px;box-shadow:0 6px 0 #c9a227}\n  .btn{margin-top:32px;padding:16px 40px;font-family:inherit;font-size:clamp(12px,2.6vw,18px);\n    letter-spacing:4px;color:#fcfcfc;background:#d82800;border:4px solid #080808;cursor:pointer;\n    text-shadow:2px 2px 0 #500a00;box-shadow:inset -4px -4px 0 #901a00,6px 6px 0 rgba(0,0,0,.35)}\n  .btn:hover{filter:brightness(1.12)}\n  .btn:active{transform:translate(3px,3px);box-shadow:inset -4px -4px 0 #901a00,2px 2px 0 rgba(0,0,0,.35)}\n  .sub{margin-top:22px;font-size:9px;color:#fcfcfc;letter-spacing:1px;line-height:2.2;max-width:540px;\n    padding:12px 18px;background:rgba(8,8,8,.75);border:3px solid #080808}\n  .mode-row{display:flex;gap:14px;margin-top:26px;flex-wrap:wrap;justify-content:center}\n  .mode{padding:12px 18px;font-family:inherit;font-size:10px;letter-spacing:2px;color:#fcfcfc;\n    background:#080808;border:3px solid #3a3a3a;cursor:pointer;text-transform:uppercase}\n  .mode.on{background:#3fd7f7;color:#080808;border-color:#0a5a70;text-shadow:none}\n  #results{background:rgba(8,8,8,.9)}\n  #results .sub{background:rgba(255,255,255,.08)}\n  #mute{position:absolute;top:10px;right:12px;z-index:6;background:#080808;\n    border:3px solid #3a3a3a;color:#fcfcfc;font-family:inherit;font-size:8px;\n    letter-spacing:2px;padding:8px 14px;cursor:pointer}\n  h1.res{font-size:clamp(18px,4.5vw,40px);letter-spacing:3px;color:#3fd7f7;\n    text-shadow:3px 3px 0 #0a5a70;line-height:1.4}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"wrap\">\n  <canvas id=\"c\"><\u002Fcanvas>\n  <button id=\"mute\" class=\"hidden\">♪ SONIDO: ON<\u002Fbutton>\n\n  <div id=\"title\" class=\"screen\">\n    <div class=\"sign\">\n      <span class=\"bam\">BAM<\u002Fspan>\n      <span class=\"big\">DUCK<\u002Fspan>\n      <div class=\"rule\"><\u002Fdiv>\n      <span class=\"big\">HUNT<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"mode-row\" id=\"modes\">\n      <button class=\"mode on\" data-mode=\"classic\">1 PATO<\u002Fbutton>\n      <button class=\"mode\" data-mode=\"double\">2 PATOS<\u002Fbutton>\n    <\u002Fdiv>\n    <button class=\"btn\" id=\"start\">PLAY<\u002Fbutton>\n    <div class=\"sub\">\n      DISPARA CON CLICK O TOCANDO<br>3 BALAS POR TANDA · 10 PATOS POR RONDA<br>ACIERTA 6 PARA PASAR\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"results\" class=\"screen hidden\">\n    <h1 class=\"res\" id=\"rtitle\">FIN DE LA CACERÍA<\u002Fh1>\n    <div id=\"rbody\" class=\"sub\" style=\"font-size:10px;line-height:2.4;max-width:560px\"><\u002Fdiv>\n    <button class=\"btn\" id=\"again\">PLAY<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n\"use strict\";\n(function(){\n/* ============ VIRTUAL PIXEL DISPLAY ============ */\nconst VW=320, VH=200, HUD_H=32, DIRT_H=8, GRASS_H=26;\nconst GROUND=VH-HUD_H-DIRT_H-GRASS_H;\nconst cv=document.getElementById('c'), mctx=cv.getContext('2d');\nconst off=document.createElement('canvas'); off.width=VW; off.height=VH;\nconst ctx=off.getContext('2d');\nlet W=0,H=0,DPR=1,SCALE=1,OX=0,OY=0;\nfunction resize(){\n  DPR=Math.min(window.devicePixelRatio||1,2);\n  W=window.innerWidth;H=window.innerHeight;\n  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';\n  mctx.setTransform(DPR,0,0,DPR,0,0);\n  SCALE=Math.min(W/VW,H/VH);\n  OX=(W-VW*SCALE)/2; OY=(H-VH*SCALE)/2;\n  window.__V={scale:SCALE,ox:OX,oy:OY};\n}\nwindow.addEventListener('resize',resize);resize();\nlet PIX='\"Press Start 2P\",\"Courier New\",monospace';\ntry{document.fonts.load('8px \"Press Start 2P\"');}catch(e){}\n\n/* ============ AUDIO (original 8-bit style) ============ */\nconst A={ctx:null,master:null,on:true};\nfunction initAudio(){\n  if(A.ctx)return;\n  try{\n    const AC=window.AudioContext||window.webkitAudioContext;\n    A.ctx=new AC();\n    A.master=A.ctx.createGain();A.master.gain.value=0.85;A.master.connect(A.ctx.destination);\n  }catch(e){A.ctx=null;}\n}\nfunction sfx(type){\n  if(!A.ctx||!A.on)return;\n  try{\n    const t=A.ctx.currentTime;\n    const o=()=>A.ctx.createOscillator(), g=()=>A.ctx.createGain();\n    if(type==='shot'){\n      const b=A.ctx.createBuffer(1,A.ctx.sampleRate*0.12,A.ctx.sampleRate);\n      const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);\n      const s=A.ctx.createBufferSource();s.buffer=b;const gn=g();gn.gain.value=0.5;\n      const f=A.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=2400;\n      s.connect(f);f.connect(gn);gn.connect(A.master);s.start(t);\n      const oo=o();oo.frequency.setValueAtTime(120,t);oo.frequency.exponentialRampToValueAtTime(40,t+0.1);\n      const gg=g();gg.gain.setValueAtTime(0.4,t);gg.gain.exponentialRampToValueAtTime(0.001,t+0.12);\n      oo.connect(gg);gg.connect(A.master);oo.start(t);oo.stop(t+0.13);\n    }\n    if(type==='quack'){\n      const oo=o();oo.type='sawtooth';\n      oo.frequency.setValueAtTime(320,t);oo.frequency.linearRampToValueAtTime(240,t+0.09);\n      const f=A.ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=700;f.Q.value=3;\n      const gg=g();gg.gain.setValueAtTime(0.001,t);gg.gain.linearRampToValueAtTime(0.3,t+0.02);gg.gain.exponentialRampToValueAtTime(0.001,t+0.12);\n      oo.connect(f);f.connect(gg);gg.connect(A.master);oo.start(t);oo.stop(t+0.14);\n    }\n    if(type==='hit'){\n      [660,880,1100].forEach((fr,i)=>{const oo=o();oo.type='square';oo.frequency.value=fr;\n        const gg=g();gg.gain.setValueAtTime(0.18,t+i*0.06);gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.1);\n        oo.connect(gg);gg.connect(A.master);oo.start(t+i*0.06);oo.stop(t+i*0.06+0.12);});\n    }\n    if(type==='fall'){\n      const oo=o();oo.type='square';oo.frequency.setValueAtTime(900,t);oo.frequency.exponentialRampToValueAtTime(140,t+0.55);\n      const gg=g();gg.gain.setValueAtTime(0.18,t);gg.gain.exponentialRampToValueAtTime(0.001,t+0.6);\n      oo.connect(gg);gg.connect(A.master);oo.start(t);oo.stop(t+0.62);\n    }\n    if(type==='thud'){\n      const oo=o();oo.frequency.setValueAtTime(110,t);oo.frequency.exponentialRampToValueAtTime(50,t+0.08);\n      const gg=g();gg.gain.setValueAtTime(0.35,t);gg.gain.exponentialRampToValueAtTime(0.001,t+0.1);\n      oo.connect(gg);gg.connect(A.master);oo.start(t);oo.stop(t+0.12);\n    }\n    if(type==='laugh'){\n      [520,620,520,620,700].forEach((fr,i)=>{const oo=o();oo.type='triangle';oo.frequency.value=fr;\n        const gg=g();gg.gain.setValueAtTime(0.22,t+i*0.12);gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.1);\n        oo.connect(gg);gg.connect(A.master);oo.start(t+i*0.12);oo.stop(t+i*0.12+0.11);});\n    }\n    if(type==='round'){\n      [392,494,587,784].forEach((fr,i)=>{const oo=o();oo.type='square';oo.frequency.value=fr;\n        const gg=g();gg.gain.setValueAtTime(0.2,t+i*0.13);gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.13+0.12);\n        oo.connect(gg);gg.connect(A.master);oo.start(t+i*0.13);oo.stop(t+i*0.13+0.14);});\n    }\n    if(type==='gameover'){\n      [523,466,392,330,262].forEach((fr,i)=>{const oo=o();oo.type='triangle';oo.frequency.value=fr;\n        const gg=g();gg.gain.setValueAtTime(0.22,t+i*0.16);gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.16+0.15);\n        oo.connect(gg);gg.connect(A.master);oo.start(t+i*0.16);oo.stop(t+i*0.16+0.17);});\n    }\n  }catch(e){}\n}\n\n/* ============ SPRITES (original pixel art) ============ */\nconst DUCK_A=[\n\"............KKKK....\",\n\"...........KHHHHK...\",\n\"....KK.....KHKHHKOOO\",\n\"...KDDK....KHHHHKKK.\",\n\"..KDDDK.....KWWK....\",\n\".KKDDDKKKKKKWWWK....\",\n\"KBDDDDBBBBBBBBBK....\",\n\"KBBBBBBBBBBBBBK.....\",\n\"KKBBBBBBBBBBBK......\",\n\".KKBBBBBBBBBK.......\",\n\"...KKKKKKKKK........\"];\nconst DUCK_B=[\n\"............KKKK....\",\n\"...........KHHHHK...\",\n\"...........KHKHHKOOO\",\n\"...........KHHHHKKK.\",\n\"....KKKKK...KWWK....\",\n\".KKKBBBBKKKKWWWK....\",\n\"KBBBBBBBBBBBBBBK....\",\n\"KBBDDDDDBBBBBBK.....\",\n\"KKBDDDDDDBBBBK......\",\n\".KKDDDDDBBBBK.......\",\n\"...KKKKKKKKK........\"];\nconst VARIANTS=[\n  {B:'#2038ec',D:'#101078',H:'#d82800'},\n  {B:'#d82800',D:'#701008',H:'#00a800'},\n  {B:'#2a2a2a',D:'#101010',H:'#00a800'}\n];\nconst FIX={K:'#080808',W:'#fcfcfc',O:'#f8a020'};\nfunction drawSprite(map,x,y,dir,pal,rot){\n  ctx.save();\n  ctx.translate(Math.round(x),Math.round(y));\n  if(rot)ctx.rotate(rot);\n  ctx.scale(dir,1);\n  const w=map[0].length,h=map.length;\n  for(let r=0;r<h;r++)for(let c=0;c<w;c++){\n    const ch=map[r][c];if(ch==='.')continue;\n    ctx.fillStyle=FIX[ch]||pal[ch]||'#000';\n    ctx.fillRect(c-w/2,r-h/2,1,1);\n  }\n  ctx.restore();\n}\n\n/* ============ STATE ============ */\nconst G={\n  state:'title', mode:'classic',\n  round:1, score:0,\n  duckNum:0, DUCKS_PER_ROUND:10, NEED:6,\n  shots:3, hits:[],\n  ducks:[], feathers:[], flashT:0,\n  phase:'launch', phaseT:0, dog:null,\n  best:0, shake:0, msg:'', msgT:0,\n  ambient:[]\n};\ntry{G.best=parseInt(localStorage.getItem('bdh_best')||'0')||0;}catch(e){}\n\nfunction spawnDucks(){\n  G.ducks=[];\n  const n=G.mode==='double'?2:1;\n  for(let i=0;i<n;i++){\n    const speed=(48+G.round*9)*(0.9+Math.random()*0.3);\n    G.ducks.push({\n      x:60+Math.random()*(VW-120), y:GROUND+6,\n      vx:(Math.random()<0.5?-1:1)*speed*(0.5+Math.random()*0.5),\n      vy:-speed*(0.9+Math.random()*0.4),\n      speed, alive:true, falling:false, gone:false, escaped:false,\n      pal:VARIANTS[(G.duckNum+i)%VARIANTS.length],\n      flap:Math.random()*7, turnT:0.5+Math.random(),\n      escapeT:5.5+Math.max(0,3-G.round*0.3)\n    });\n  }\n  G.shots=3; G.phase='fly'; G.phaseT=0;\n  sfx('quack');\n}\nconst HIT_R=13;\n\n/* ============ INPUT ============ */\nlet aim={x:-50,y:-50};\nfunction toV(e){\n  const r=cv.getBoundingClientRect();\n  const t=e.touches?e.touches[0]:e;\n  return {x:(t.clientX-r.left-OX)/SCALE, y:(t.clientY-r.top-OY)/SCALE};\n}\ncv.addEventListener('mousemove',e=>{aim=toV(e);});\ncv.addEventListener('touchmove',e=>{e.preventDefault();aim=toV(e);},{passive:false});\nfunction shoot(e){\n  if(G.state!=='play'||G.phase!=='fly')return;\n  if(G.shots<=0)return;\n  const p=toV(e); aim=p;\n  G.shots--; G.flashT=0.06; G.shake=2.5;\n  sfx('shot');\n  let hitAny=false;\n  for(const d of G.ducks){\n    if(!d.alive||d.falling)continue;\n    const dx=p.x-d.x, dy=p.y-d.y;\n    if(dx*dx+dy*dy < HIT_R*HIT_R){\n      d.falling=true; d.alive=false; d.vy=-55; d.vx*=0.15; hitAny=true;\n      G.score+=Math.round(100*(1+G.round*0.25));\n      sfx('hit'); setTimeout(()=>sfx('fall'),350);\n      burst(d.x,d.y,d.pal.B);\n    }\n  }\n  const remaining=G.ducks.some(d=>d.alive&&!d.falling);\n  if(!hitAny && G.shots<=0 && remaining){ G.phase='flyaway'; G.phaseT=0; }\n}\ncv.addEventListener('mousedown',shoot);\ncv.addEventListener('touchstart',e=>{e.preventDefault();shoot(e);},{passive:false});\nfunction burst(x,y,col){\n  for(let i=0;i<10;i++){\n    G.feathers.push({x,y,vx:(Math.random()-0.5)*90,vy:-Math.random()*70,\n      col:Math.random()<0.5?col:'#fff',life:0.8+Math.random()*0.5});\n  }\n}\n\n/* ============ UPDATE ============ */\nfunction update(dt){\n  G.flashT=Math.max(0,G.flashT-dt);\n  G.shake=Math.max(0,G.shake-dt*12);\n  if(G.msgT>0)G.msgT-=dt;\n  for(const f of G.feathers){f.life-=dt;f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=110*dt;}\n  G.feathers=G.feathers.filter(f=>f.life>0);\n\n  if(G.phase==='fly'){\n    G.phaseT+=dt;\n    for(const d of G.ducks){\n      if(d.falling){\n        d.vy+=300*dt; d.y+=d.vy*dt; d.flap+=dt*20;\n        if(d.y>GROUND+10){ d.gone=true; d.falling=false; sfx('thud'); }\n      } else if(d.alive){\n        d.flap+=dt*14; d.turnT-=dt;\n        if(d.turnT<=0){\n          d.turnT=0.5+Math.random()*1.1;\n          const ang=(Math.random()*0.9+0.2)*Math.PI*(Math.random()<0.5?1:-1)*0.5;\n          const cur=Math.atan2(d.vy,d.vx), na=cur+ang*0.8;\n          d.vx=Math.cos(na)*d.speed; d.vy=Math.sin(na)*d.speed;\n          if(Math.random()<0.35)sfx('quack');\n        }\n        d.x+=d.vx*dt; d.y+=d.vy*dt;\n        if(d.x<14){d.x=14;d.vx=Math.abs(d.vx);}\n        if(d.x>VW-14){d.x=VW-14;d.vx=-Math.abs(d.vx);}\n        if(d.y<14){d.y=14;d.vy=Math.abs(d.vy);}\n        if(d.y>GROUND-14){d.y=GROUND-14;d.vy=-Math.abs(d.vy);}\n        d.escapeT-=dt;\n        if(d.escapeT<=0){ G.phase='flyaway'; G.phaseT=0; }\n      }\n    }\n    if(G.ducks.length&&G.ducks.every(d=>d.gone)) endTanda();\n  }\n  else if(G.phase==='flyaway'){\n    G.phaseT+=dt;\n    let anyLeft=false;\n    for(const d of G.ducks){\n      if(d.falling){d.vy+=300*dt;d.y+=d.vy*dt;if(d.y>GROUND+10){d.gone=true;d.falling=false;sfx('thud');}anyLeft=true;continue;}\n      if(!d.alive)continue;\n      d.flap+=dt*18;\n      d.vy=-Math.abs(d.speed)*1.2; d.vx*=0.98;\n      d.y+=d.vy*dt; d.x+=d.vx*dt;\n      if(d.y<-20){ d.alive=false; d.escaped=true; }\n      else anyLeft=true;\n    }\n    if(!anyLeft) endTanda();\n  }\n  else if(G.phase==='dog'){\n    G.phaseT+=dt;\n    const d=G.dog;\n    if(d){ d.t+=dt; if(d.t>1.8){ G.dog=null; nextTanda(); } }\n  }\n  for(const a of G.ambient){ a.x+=a.vx*dt; a.flap+=dt*12; if(a.x>VW+30)a.x=-30; if(a.x<-30)a.x=VW+30; }\n}\nfunction endTanda(){\n  for(const d of G.ducks) G.hits.push(!!d.gone);\n  G.duckNum=G.hits.length;\n  const lastHits=G.ducks.filter(d=>d.gone).length;\n  G.dog={t:0,happy:lastHits>0,count:lastHits};\n  if(lastHits>0)sfx('hit'); else sfx('laugh');\n  G.phase='dog'; G.phaseT=0; G.ducks=[];\n}\nfunction nextTanda(){\n  if(G.duckNum>=G.DUCKS_PER_ROUND){\n    const rh=G.hits.filter(Boolean).length;\n    if(rh>=G.NEED){\n      G.round++; G.hits=[]; G.duckNum=0;\n      G.msg='RONDA '+G.round; G.msgT=1.6; sfx('round');\n      setTimeout(()=>{ if(G.state==='play')spawnDucks(); },1400);\n      G.phase='launch';\n    } else gameOver();\n  } else spawnDucks();\n}\nfunction gameOver(){\n  G.state='results'; sfx('gameover');\n  let nb=false;\n  if(G.score>G.best){G.best=G.score;nb=true;try{localStorage.setItem('bdh_best',G.score);}catch(e){}}\n  document.getElementById('rtitle').textContent=nb?'¡NUEVO RÉCORD!':'FIN DE LA CACERÍA';\n  const rh=G.hits.filter(Boolean).length;\n  document.getElementById('rbody').innerHTML=\n    `LLEGASTE A LA <b style=\"color:#3fd7f7\">RONDA ${G.round}<\u002Fb><br>`+\n    `PUNTUACIÓN: <b style=\"color:#3fd7f7\">${G.score}<\u002Fb> PTS<br>`+\n    `RÉCORD: ${G.best} PTS<br>`+\n    `ÚLTIMA RONDA: ${rh}/${G.DUCKS_PER_ROUND} PATOS (NECESITABAS ${G.NEED})`;\n  document.getElementById('results').classList.remove('hidden');\n  document.getElementById('mute').classList.add('hidden');\n}\n\n/* ============ RENDER (320x200 virtual pixels, NES palette) ============ */\nfunction render(){\n  ctx.save();\n  if(G.shake>0)ctx.translate(Math.round((Math.random()-0.5)*G.shake),Math.round((Math.random()-0.5)*G.shake));\n  // flat NES sky blue\n  ctx.fillStyle='#3fa7f0'; ctx.fillRect(-4,-4,VW+8,VH+8);\n  drawTree(46,GROUND+GRASS_H-2);\n  drawBush(VW-52,GROUND+GRASS_H-4);\n  drawGrass();\n  // dirt strip\n  ctx.fillStyle='#8a5c20'; ctx.fillRect(-4,GROUND+GRASS_H,VW+8,DIRT_H);\n  ctx.fillStyle='#6a4414';\n  for(let x=0;x<VW;x+=11){ ctx.fillRect(x,GROUND+GRASS_H+2,3,1); ctx.fillRect(x+6,GROUND+GRASS_H+5,2,1); }\n\n  if(G.state==='title'){\n    for(const a of G.ambient){\n      drawSprite(Math.floor(a.flap)%2?DUCK_A:DUCK_B,a.x,a.y,a.vx>=0?1:-1,a.pal);\n    }\n  }\n\n  if(G.state==='play'){\n    for(const d of G.ducks){\n      if(d.gone)continue;\n      if(d.falling) drawSprite(DUCK_B,d.x,d.y,1,d.pal,Math.PI);\n      else if(d.alive) drawSprite(Math.floor(d.flap)%2?DUCK_A:DUCK_B,d.x,d.y,d.vx>=0?1:-1,d.pal);\n    }\n    for(const f of G.feathers){\n      ctx.globalAlpha=Math.max(0,Math.min(1,f.life));\n      ctx.fillStyle=f.col;ctx.fillRect(Math.round(f.x),Math.round(f.y),2,1);\n    }\n    ctx.globalAlpha=1;\n    if(G.phase==='dog'&&G.dog)drawDog(G.dog);\n    if(G.flashT>0){ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillRect(-4,-4,VW+8,VH+8);}\n    drawCrosshair();\n    if(G.msgT>0){\n      ctx.fillStyle='#080808';ctx.fillRect(VW/2-56,66,112,26);\n      ctx.fillStyle='#3fd7f7';ctx.font='9px '+PIX;\n      ctx.textAlign='center';ctx.textBaseline='middle';\n      ctx.fillText(G.msg,VW/2,80);\n    }\n  }\n  ctx.restore();\n  drawHUD();\n  blit();\n}\nfunction blit(){\n  mctx.fillStyle='#000';mctx.fillRect(0,0,W,H);\n  mctx.imageSmoothingEnabled=false;\n  mctx.drawImage(off,OX,OY,VW*SCALE,VH*SCALE);\n}\nfunction drawGrass(){\n  // bright NES green band with tall jagged blades along the top edge\n  ctx.fillStyle='#30b820'; ctx.fillRect(-4,GROUND,VW+8,GRASS_H);\n  // jagged blade fringe (deterministic pseudo-random)\n  ctx.fillStyle='#30b820';\n  for(let x=0;x<VW;x+=2){\n    const h=2+((x*7)%3)+((x*13)%4);\n    ctx.fillRect(x,GROUND-h,1,h+1);\n  }\n  // dark blades inside the band\n  ctx.fillStyle='#0c7010';\n  for(let x=0;x<VW;x+=3){\n    const h=3+((x*11)%5);\n    ctx.fillRect(x+((x%6)?1:0),GROUND-((x*5)%3),1,h);\n  }\n  for(let x=0;x<VW;x+=7){ ctx.fillRect(x,GROUND+8,1,5); ctx.fillRect(x+3,GROUND+13,1,4); }\n  // light blade highlights\n  ctx.fillStyle='#8ce85c';\n  for(let x=1;x<VW;x+=5){\n    const h=3+((x*3)%4);\n    ctx.fillRect(x,GROUND-h+1,1,h);\n  }\n  ctx.fillStyle='#c8f8a0';\n  for(let x=4;x<VW;x+=16){ ctx.fillRect(x,GROUND-2,1,3); }\n}\nfunction drawTree(x,baseY){\n  ctx.fillStyle='#984418';\n  ctx.fillRect(x-4,baseY-70,8,70);\n  ctx.fillRect(x-10,baseY-46,7,4);\n  ctx.fillRect(x+3,baseY-58,9,4);\n  ctx.fillStyle='#6c2c0c';\n  ctx.fillRect(x-1,baseY-70,2,70);\n  const clump=(cx,cy,r)=>{\n    ctx.fillStyle='#0c7010';\n    ctx.fillRect(cx-r-1,cy-r+2,2*r+2,2*r-3);\n    ctx.fillRect(cx-r+2,cy-r-1,2*r-4,2*r+2);\n    ctx.fillStyle='#30b820';\n    ctx.fillRect(cx-r,cy-r+3,2*r,2*r-5);\n    ctx.fillRect(cx-r+3,cy-r,2*r-6,2*r);\n    ctx.fillStyle='#8ce85c';\n    ctx.fillRect(cx-r+3,cy-r+3,r-2,2);\n  };\n  clump(x-16,baseY-52,9);\n  clump(x+16,baseY-64,10);\n  clump(x-2,baseY-82,11);\n  clump(x+10,baseY-44,7);\n}\nfunction drawBush(x,baseY){\n  ctx.fillStyle='#0c7010';\n  ctx.fillRect(x-20,baseY-13,40,13);\n  ctx.fillRect(x-14,baseY-19,28,8);\n  ctx.fillRect(x-6,baseY-23,14,6);\n  ctx.fillStyle='#30b820';\n  ctx.fillRect(x-18,baseY-11,36,10);\n  ctx.fillRect(x-12,baseY-17,24,7);\n  ctx.fillRect(x-4,baseY-21,10,5);\n  ctx.fillStyle='#8ce85c';\n  ctx.fillRect(x-10,baseY-15,5,2);ctx.fillRect(x+4,baseY-10,4,2);\n}\nfunction drawDog(dg){\n  const x=VW/2;\n  const rise=Math.min(1,dg.t/0.5);\n  const y=GROUND+14-rise*26;\n  ctx.save();\n  ctx.beginPath();ctx.rect(0,0,VW,GROUND+6);ctx.clip();\n  ctx.translate(Math.round(x),Math.round(y));\n  ctx.fillStyle='#080808';\n  ctx.fillRect(-15,-22,6,12);ctx.fillRect(9,-22,6,12);\n  ctx.fillStyle='#4a2e10';\n  ctx.fillRect(-14,-21,4,10);ctx.fillRect(10,-21,4,10);\n  ctx.fillStyle='#080808';ctx.fillRect(-11,-24,22,20);\n  ctx.fillStyle='#b07840';ctx.fillRect(-10,-23,20,18);\n  ctx.fillStyle='#e8c28e';ctx.fillRect(-6,-12,12,7);\n  ctx.fillStyle='#080808';ctx.fillRect(-2,-13,4,3);\n  ctx.fillStyle='#080808';\n  if(dg.happy){\n    ctx.fillRect(-7,-19,4,1);ctx.fillRect(-8,-18,1,1);ctx.fillRect(-4,-18,1,1);\n    ctx.fillRect(3,-19,4,1);ctx.fillRect(2,-18,1,1);ctx.fillRect(6,-18,1,1);\n    ctx.fillRect(-3,-7,6,1);\n  } else {\n    const sq=Math.floor(dg.t*10)%2;\n    ctx.fillRect(-7,-18+sq,4,1);ctx.fillRect(3,-18+sq,4,1);\n    ctx.fillRect(-3,-8,6,3-sq);\n  }\n  ctx.fillStyle='#080808';ctx.fillRect(-13,-5,26,14);\n  ctx.fillStyle='#b07840';ctx.fillRect(-12,-4,24,12);\n  if(dg.happy){\n    for(let i=0;i<Math.max(1,dg.count);i++){\n      drawSpriteOn(ctx,DUCK_B,-24-i*6,-24-i*4,1,VARIANTS[i%3],0.55);\n    }\n  }\n  ctx.fillStyle='#fcfcfc';\n  const label=dg.happy?(dg.count>1?'¡DOBLE!':'¡BAM!'):'JI JI JI';\n  ctx.font='6px '+PIX;ctx.textAlign='center';\n  const tw=ctx.measureText(label).width+8;\n  ctx.fillRect(-tw/2,-40,tw,12);\n  ctx.fillStyle='#080808';ctx.fillText(label,0,-32);\n  ctx.restore();\n}\nfunction drawSpriteOn(c,map,x,y,dir,pal,scale){\n  c.save();c.translate(Math.round(x),Math.round(y));c.scale(dir*(scale||1),(scale||1));\n  const w=map[0].length,h=map.length;\n  for(let r=0;r<h;r++)for(let cc=0;cc<w;cc++){\n    const ch=map[r][cc];if(ch==='.')continue;\n    c.fillStyle=FIX[ch]||pal[ch]||'#000';\n    c.fillRect(cc-w/2,r-h/2,1,1);\n  }\n  c.restore();\n}\nfunction drawCrosshair(){\n  const x=Math.round(aim.x),y=Math.round(aim.y);\n  ctx.fillStyle='#d82800';\n  ctx.fillRect(x-7,y,4,1);ctx.fillRect(x+4,y,4,1);\n  ctx.fillRect(x,y-7,1,4);ctx.fillRect(x,y+4,1,4);\n  ctx.fillRect(x-1,y-1,3,3);\n  ctx.fillStyle='#fff';ctx.fillRect(x,y,1,1);\n}\nfunction drawHUD(){\n  const y0=VH-HUD_H;\n  // black HUD bar\n  ctx.fillStyle='#080808';ctx.fillRect(0,y0,VW,HUD_H);\n  ctx.textBaseline='top';\n  // R=N in green, top-left above the boxes\n  ctx.fillStyle='#30b820';ctx.font='7px '+PIX;ctx.textAlign='left';\n  ctx.fillText('R='+G.round,8,y0+3);\n  // SHOT box — white with black border\n  box(6,y0+13,44,16);\n  for(let i=0;i<3;i++){\n    ctx.fillStyle=i<G.shots?'#d82800':'#c0c0c0';\n    ctx.fillRect(11+i*7,y0+16,3,6);\n    ctx.fillStyle=i<G.shots?'#f8a020':'#a0a0a0';\n    ctx.fillRect(11+i*7,y0+15,3,2);\n  }\n  ctx.fillStyle='#080808';ctx.font='5px '+PIX;\n  ctx.fillText('SHOT',12,y0+23);\n  // HIT bar — white box, black inset with cyan HIT label\n  const hx=58,hw=VW-58-76;\n  box(hx,y0+8,hw,18);\n  ctx.fillStyle='#080808';ctx.fillRect(hx+3,y0+11,24,12);\n  ctx.fillStyle='#3fd7f7';ctx.font='7px '+PIX;\n  ctx.fillText('HIT',hx+5,y0+14);\n  const cell=(hw-34)/G.DUCKS_PER_ROUND;\n  for(let i=0;i<G.DUCKS_PER_ROUND;i++){\n    const dx=hx+30+i*cell+cell/2, dy=y0+17;\n    let col='#fcfcfc';\n    if(i<G.hits.length) col=G.hits[i]?'#d82800':'#909090';\n    miniDuck(dx,dy,col,i>=G.hits.length);\n  }\n  // SCORE box — white with black digits\n  box(VW-72,y0+8,66,18);\n  ctx.fillStyle='#080808';ctx.font='7px '+PIX;ctx.textAlign='right';\n  ctx.fillText(String(G.score).padStart(6,'0'),VW-10,y0+11);\n  ctx.font='6px '+PIX;\n  ctx.fillText('SCORE',VW-10,y0+19);\n  if(G.best>0&&G.state==='play'){\n    ctx.fillStyle='rgba(8,8,8,.5)';ctx.fillRect(VW-76,2,74,11);\n    ctx.fillStyle='#f8d838';ctx.font='6px '+PIX;ctx.textAlign='right';\n    ctx.fillText('TOP '+G.best,VW-5,4);\n  }\n  ctx.textAlign='left';\n}\nfunction box(x,y,w,h){\n  ctx.fillStyle='#080808';ctx.fillRect(x-1,y-1,w+2,h+2);\n  ctx.fillStyle='#fcfcfc';ctx.fillRect(x,y,w,h);\n  ctx.fillStyle='#909090';\n  ctx.fillRect(x,y+h-1,w,1);ctx.fillRect(x+w-1,y,1,h);\n}\nfunction miniDuck(x,y,col,outline){\n  x=Math.round(x);y=Math.round(y);\n  if(outline){\n    ctx.fillStyle='#080808';\n    ctx.fillRect(x-4,y-2,8,5);ctx.fillRect(x+1,y-4,5,4);ctx.fillRect(x-6,y-3,3,3);\n  }\n  ctx.fillStyle=col;\n  ctx.fillRect(x-3,y-1,6,3);\n  ctx.fillRect(x+2,y-3,3,3);\n  ctx.fillRect(x-5,y-2,2,2);\n}\n\n/* ============ LOOP ============ */\nlet last=0;\nfunction frame(t){\n  const dt=Math.min((t-last)/1000,0.05)||0;last=t;\n  try{ update(dt); }catch(e){}\n  try{ render(); }catch(e){}\n  requestAnimationFrame(frame);\n}\n\n/* ============ FLOW ============ */\nfunction makeAmbient(){\n  G.ambient=[\n    {x:VW*0.7,y:30,vx:22,flap:0,pal:VARIANTS[0]},\n    {x:VW*0.3,y:56,vx:-18,flap:3,pal:VARIANTS[1]}\n  ];\n}\nmakeAmbient();\nfunction startGame(){\n  try{ initAudio(); if(A.ctx&&A.ctx.state==='suspended')A.ctx.resume(); }catch(e){}\n  Object.assign(G,{state:'play',round:1,score:0,duckNum:0,hits:[],ducks:[],feathers:[],shots:3,phase:'launch',dog:null,msg:'RONDA 1',msgT:1.4});\n  document.getElementById('title').classList.add('hidden');\n  document.getElementById('results').classList.add('hidden');\n  document.getElementById('mute').classList.remove('hidden');\n  sfx('round');\n  setTimeout(()=>{ if(G.state==='play')spawnDucks(); },1200);\n}\ndocument.querySelectorAll('#modes .mode').forEach(b=>b.addEventListener('click',()=>{\n  document.querySelectorAll('#modes .mode').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');G.mode=b.dataset.mode;}));\ndocument.getElementById('start').addEventListener('click',startGame);\ndocument.getElementById('again').addEventListener('click',startGame);\ndocument.getElementById('mute').addEventListener('click',function(){\n  A.on=!A.on;this.textContent=A.on?'♪ SONIDO: ON':'♪ SONIDO: OFF';});\n\nrequestAnimationFrame(frame);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<script>
/* BAMboy: cualquier boton dispara un click al centro (empezar partida) */
(function(){
  window.addEventListener('message', function(e){
    var d = e.data;
    if (!d || d.bamboy !== 'btn') return;
    var x = innerWidth/2, y = innerHeight/2;
    var el = document.elementFromPoint(x, y) || document.body;
    el.dispatchEvent(new MouseEvent('click', {clientX:x, clientY:y, bubbles:true, cancelable:true}));
  });
})();
</script>
